<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#090909;
    color:white;
    overflow:hidden;
}

/* ========================================================= */
/* ======================= BOOT ============================ */
/* ========================================================= */

#bootScreen{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at center,#1b1f24 0%,#040404 80%);

    z-index:999999;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    animation:desaparecer 1.5s ease forwards;
    animation-delay:6s;
}

.ruido{
    position:absolute;
    inset:0;

    background-image:
    repeating-radial-gradient(
        circle at center,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.01) 1px,
        transparent 2px
    );

    opacity:0.15;

    animation:ruidoMove 0.3s linear infinite;
}

.scanlines{
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0px,
        rgba(255,255,255,0.03) 2px,
        transparent 4px
    );

    pointer-events:none;
}

.contenido-boot{
    width:70%;
    max-width:900px;

    text-align:center;

    position:relative;
    z-index:10;
}

.simbolo img{
    width:190px;

    margin-bottom:20px;

    animation:pulso 2s infinite;
}

.titulo-boot{
    font-size:3rem;
    letter-spacing:10px;

    color:#dce4ee;

    margin-bottom:40px;

    text-shadow:0 0 15px #93a4b6;
}

.barra-carga{
    width:100%;
    height:20px;

    border:2px solid #98a7b8;

    background:#111;

    overflow:hidden;

    margin-bottom:30px;
}

.progreso{
    width:0%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        #e3e9f0,
        #8d9cad,
        #d8e2ec
    );

    animation:cargar 5.5s linear forwards;
}

.texto-boot{
    font-size:1.2rem;

    color:#cfd7e2;

    letter-spacing:3px;

    margin-bottom:35px;
}

.codigo{
    font-family:monospace;

    color:#95a5b8;

    opacity:0.6;
}

/* ========================================================= */
/* ======================= HEADER ========================== */
/* ========================================================= */

header{
    width:100%;
    height:80px;

    border-bottom:3px solid #bcc7d3;

    background:#0d0d0d;

    display:flex;
    align-items:center;

    padding:0 25px;
}

.logo{
    width:85px;
    height:70px;

    background:black;

    border-radius:50% 10% 50% 10%;

    display:flex;
    align-items:center;
    justify-content:center;

    margin-right:15px;

    overflow:hidden;

    border:2px solid #95a3b4;
}

.logo img{
    width:75px;
}

.titulo{
    font-size:2.5rem;
    font-weight:300;

    color:#dce4ee;
}

/* ========================================================= */
/* ===================== CONTENIDO ========================= */
/* ========================================================= */

.contenedor{
    display:flex;
    height:calc(100vh - 80px);
}

/* ================= SIDEBAR ================= */

aside{
    width:280px;

    background:#3b3f46;

    padding:35px 20px;

    display:flex;
    flex-direction:column;

    gap:18px;
}

.boton{
    width:100%;
    min-height:58px;

    padding:12px 15px;

    border:none;
    border-radius:18px;

    background:#1d1f22;

    color:white;

    font-size:1.1rem;

    font-weight:600;

    font-family:'Montserrat', sans-serif;

    letter-spacing:1px;

    text-align:left;

    cursor:pointer;

    transition:0.3s;

    border:2px solid #5f6c7b;
}

.boton:hover{
    transform:scale(1.02);

    background:#2d3136;

    box-shadow:0 0 20px rgba(200,220,255,0.2);
}

/* ================= MAIN ================= */

main{
    flex:1;

    background:#060606;

    padding:35px;

    overflow-y:auto;
}

/* ================= PRINCIPAL ================= */

#paginaPrincipal{
    display:block;
}

.saludo{
    width:90%;
    min-height:260px;

    margin:auto;

    background:#14171b;

    border:2px solid #5e6d7d;

    border-radius:40px;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:30px;

    color:#dbe3ec;

    padding:20px;
}

.saludo img{
    height:250px;
}

.linea{
    width:100%;
    height:1px;

    background:#bcc6d1;

    margin:50px 0;
}

.contenedor-iconos{
    display:flex;
    justify-content:space-between;

    flex-wrap:wrap;

    gap:20px;
}

.icono{
    width:180px;
    height:260px;

    background:black;

    border-radius:30px;

    border:2px solid #5d6b7b;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:2rem;

    transition:0.3s;
}

.icono:hover{
    transform:translateY(-10px);
}

/* ========================================================= */
/* ======================= TEXTO =========================== */
/* ========================================================= */

#paginaTexto{
    display:none;
    position:relative;
}

.panel-texto{
    width:95%;
    min-height:700px;

    margin:auto;

    background:#121417;

    border-radius:40px;

    border:2px solid #5f6e7f;

    padding:20px;

    position:relative;
}

.numero{
    font-size:3rem;

    margin-bottom:20px;
}

.texto-central{

    width:92%;

    min-height:600px;

    margin:auto;

    background:
    linear-gradient(
        180deg,
        #d7dee8,
        #c8d2dd
    );

    color:#2c3238;

    display:block;

    overflow-y:auto;

    padding:40px;

    font-size:1.05rem;

    font-family:'Special Elite', cursive;

    line-height:1.9;

    border-radius:20px;

    border:3px solid #8e9aa7;
}

.texto-central h1{

    font-size:2.4rem;

    margin-bottom:25px;

    color:#111;

    border-bottom:3px solid #7d8b99;

    padding-bottom:10px;
}

.texto-central h2{

    margin-top:40px;
    margin-bottom:18px;

    color:#20262d;

    font-size:1.5rem;
}

.texto-central p{
    margin-bottom:22px;
}

.texto-central strong{
    color:#111;
}

/* ================= VOLVER ================= */

.volver{
    position:absolute;

    top:20px;
    right:20px;

    width:80px;
    height:60px;

    border:none;
    border-radius:15px;

    background:#25292e;

    color:white;

    font-size:2rem;

    cursor:pointer;
}

/* ========================================================= */
/* ================== CARGA DE TEXTO ======================= */
/* ========================================================= */

#pantallaCargaTexto{
    position:fixed;

    top:80px;
    left:280px;
    right:0;
    bottom:0;

    background:
    radial-gradient(circle,#16181c 0%,#090909 100%);

    border-radius:0;

    display:none;

    align-items:center;
    justify-content:center;

    z-index:9999;
}

.contenedor-carga-texto{
    width:50%;

    text-align:center;
}

.titulo-carga{
    font-size:2rem;

    letter-spacing:8px;

    margin-bottom:30px;

    color:#dbe4ef;
}

.barra-carga-texto{
    width:100%;
    height:22px;

    border:2px solid #aab7c7;

    background:#111;

    overflow:hidden;

    margin-bottom:20px;
}

.progreso-texto{
    width:0%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        #dfe7f0,
        #7d8b9c,
        #dce5ef
    );
}

.porcentaje{
    font-size:1.4rem;

    color:#c9d4df;
}

/* ========================================================= */
/* ======================= ANIMACIONES ===================== */
/* ========================================================= */

@keyframes cargar{

    from{
        width:0%;
    }

    to{
        width:100%;
    }
}

@keyframes desaparecer{

    0%{
        opacity:1;
        visibility:visible;
    }

    100%{
        opacity:0;
        visibility:hidden;
    }
}

@keyframes ruidoMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(10px);
    }
}

@keyframes pulso{

    0%{
        transform:scale(1);
        opacity:0.5;
    }

    50%{
        transform:scale(1.1);
        opacity:1;
    }

    100%{
        transform:scale(1);
        opacity:0.5;
    }
}

</style>
</head>

<body>

<!-- ========================================================= -->
<!-- ===================== BOOT SCREEN ====================== -->
<!-- ========================================================= -->

<div id="bootScreen">

    <div class="ruido"></div>

    <div class="scanlines"></div>

    <div class="contenido-boot">

        <div class="simbolo">
            <img src="visual/ICON.30v.png" alt="">
        </div>

        <div class="titulo-boot">
            ARCHIVE SYSTEM
        </div>

        <div class="barra-carga">
            <div class="progreso"></div>
        </div>

        <div class="texto-boot" id="textoBoot">
            Iniciando sistema...
        </div>

        <div class="codigo">
            BETA v0.1
        </div>

    </div>

</div>

<header>

    <div class="logo">
        <img src="visual/ICON.30v.png" alt="Logo">
    </div>

    <h1 class="titulo">
        Sistema Archive<i style="color: gray;">_BETA</i>
    </h1>

</header>

<div class="contenedor">

    <aside>

        <button class="boton" onclick="mostrarTexto('001')">
            Caso 001
        </button>

        <button class="boton" onclick="mostrarTexto('002')">
            Caso 002
        </button>

        <button class="boton" onclick="mostrarTexto('003')">
            Caso 003
        </button>

        <button class="boton" onclick="mostrarTexto('004')">
            Caso 004
        </button>

        <button class="boton" onclick="mostrarTexto('005')">
            Caso 005
        </button>

    </aside>

    <main>

        <!-- ================= PRINCIPAL ================= -->

        <section id="paginaPrincipal">

            <div class="saludo">
                <span class="titulo-boot">
                    Welcome to the Archive
                </span>

            </div>

            <div class="linea"></div>

            <div class="contenedor-iconos">

                <div class="icono"></div>
                <div class="icono"></div>
                <div class="icono"></div>
                <div class="icono"></div>
                <div class="icono"></div>

            </div>

        </section>

        <!-- ================= TEXTO ================= -->

        <section id="paginaTexto">

            <!-- ================= CARGA ================= -->

            <div id="pantallaCargaTexto">

                <div class="contenedor-carga-texto">

                    <div class="titulo-carga">
                        CARGANDO INFORMACION
                    </div>

                    <div class="barra-carga-texto">
                        <div class="progreso-texto"></div>
                    </div>

                    <div class="porcentaje" id="porcentajeCarga">
                        0%
                    </div>

                </div>

            </div>

            <!-- ================= PANEL ================= -->

            <div class="panel-texto">

                <button class="volver" onclick="volverInicio()">
                    <<
                </button>

                <div class="numero" id="numeroPanel">
                    001
                </div>

                <div class="texto-central" id="contenidoTexto">
                    Text
                </div>

            </div>

        </section>

    </main>

</div>

<script>

/* ========================================================= */
/* ==================== BOOT TEXTOS ======================== */
/* ========================================================= */

const bootTextos = [

    "Conectando núcleo...",
    "Verificando memoria...",
    "Activando protocolos...",
    "Escaneando sistema...",
    "Inicializando interfaz...",
    "Acceso concedido."

];

let indiceBoot = 0;

const textoBoot = document.getElementById("textoBoot");

const intervaloBoot = setInterval(() => {

    indiceBoot++;

    if(indiceBoot < bootTextos.length){

        textoBoot.innerText = bootTextos[indiceBoot];

    }

}, 900);

setTimeout(() => {

    clearInterval(intervaloBoot);

}, 5500);

/* ========================================================= */
/* =================== CAMBIO PAGINAS ====================== */
/* ========================================================= */

function mostrarTexto(numero){

    document.getElementById("paginaPrincipal").style.display = "none";

    document.getElementById("paginaTexto").style.display = "block";

    const pantallaCarga =
    document.getElementById("pantallaCargaTexto");

    const barra =
    document.querySelector(".progreso-texto");

    const porcentaje =
    document.getElementById("porcentajeCarga");

    pantallaCarga.style.display = "flex";

    barra.style.width = "0%";

    porcentaje.innerText = "0%";

    let progreso = 0;

    const intervalo = setInterval(() => {

        progreso += 4;

        barra.style.width = progreso + "%";

        porcentaje.innerText = progreso + "%";

        if(progreso >= 100){

            clearInterval(intervalo);

            setTimeout(() => {

                pantallaCarga.style.display = "none";

                document.getElementById("numeroPanel").innerText = numero;

                let contenidoDinamico = "";

                if(numero === "002"){

                    contenidoDinamico = `

                    <h1>Bernie Madoff: El Mayor Esquema Ponzi de la Historia</h1>

                    <p>
                    Bernie Madoff no solo fue un criminal, sino una figura que personificó la traición a la confianza en el corazón <br>financiero del mundo. Su estafa, valorada en unos 65.000 millones de dólares (incluyendo ganancias ficticias), <br>es el esquema Ponzi más grande y duradero de la historia.
                    </p>

                    <p>
                    Aquí tienes la radiografía completa de su ascenso, su método y su caída:
                    </p>

                    <h2>1. El Método: El Esquema Ponzi Maestro</h2>

                    <p>
                    A diferencia de otros estafadores que prometen retornos astronómicos para atraer incautos, Madoff fue mucho más <br>sofisticado.
                    </p>

                    <p>
                    <strong>La Estrategia "Split-Strike Conversion":</strong>Madoff afirmaba utilizar una estrategia legítima de <br>opciones y acciones para minimizar el riesgo. Lo que lo hacía creíble era que sus retornos no eran "demasiado <br>buenos para ser verdad" (promediaba un 10% o 12% anual), pero eran sospechosamente constantes, incluso cuando el mercado caía.
                    </p>

                    <p>
                    <strong>La Realidad:</strong> No existía tal inversión. El dinero de los nuevos inversores se utilizaba para pagar <br>los retornos de los antiguos. El resto se desviaba para mantener el estilo de vida de su familia y empleados cómplices.
                    </p>

                    <p>
                    <strong>Contabilidad de Humo:</strong> En su oficina del "piso 17" del edificio Lipstick en Nueva York, un equipo <br>de empleados con poca formación financiera generaba miles de estados de cuenta falsos cada mes usando <br>computadoras antiguas, simulando operaciones que nunca ocurrieron en el mercado real.
                    </p>

                    <h2>2. Cómo Mantuvo la Mentira por 40 Años</h2>

                    <p>
                    El éxito de Madoff no fue solo técnico, sino psicológico. Logró lo que nadie más pudo gracias a tres pilares:
                    </p>

                    <p>
                    <strong>Prestigio Institucional:</strong>Madoff no era un aparecido. Fue uno de los fundadores y presidente del <br> <strong>NASDAQ</strong>. Ayudó a desarrollar los sistemas electrónicos que hoy rigen Wall Street. Ese currículum lo hacía "intocable" ante los ojos de los reguladores.
                    </p>

                    <p>
                    <strong>El Aura de Exclusividad:</strong> Aplicaba la psicología inversa. No perseguía a los inversores; a menudo <br>los rechazaba o les ponía condiciones difíciles. Esto creaba una necesidad de "pertenecer" al club selecto de <br>Madoff. Si estabas con Bernie, habías "llegado" a la cima.
                    </p>

                    <p>
                    <strong>El Fallo de la SEC:</strong> La Comisión de Bolsa y Valores (SEC) recibió múltiples alertas, especialmente <br>del analista <strong>Harry Markopolos</strong>, quien demostró matemáticamente que los números de Madoff eran <br>imposibles. Sin <br>embargo, debido a la reputación de Bernie, las investigaciones fueron superficiales y él <br>logró engañar a los <br>auditores mostrando registros incompletos.
                    </p>


                    <h2>3. Su Forma de Ser: El Narcisista Imperturbable</h2>

                    <p>
                    Quienes lo conocieron lo describen como un hombre de contrastes:
                    </p>

                    <p>
                    <strong>Carisma Silencioso:</strong> No era el típico vendedor gritón. Era un hombre reservado, extremadamente <br>ordenado (casi obsesivo con la limpieza y la disposición de los objetos en su oficina) y proyectaba una calma absoluta.
                    </p>

                    <p>
                    <strong>Frialdad Emocional:</strong> A pesar de arruinar a organizaciones benéficas, universidades y amigos de <br>toda la vida, Madoff mostró poca empatía real. En entrevistas posteriores desde la cárcel, racionalizaba sus <br>actos diciendo que los inversores eran "codiciosos" y que él solo les daba lo que querían ver.
                    </p>

                    <p>
                    <strong>Doble Vida:</strong> Mientras era un filántropo respetado en la comunidad judía y un pilar de Palm Beach, <br>dirigía una operación criminal que requería mentir diariamente a sus propios hijos, quienes trabajaban en la sección legítima de la empresa.    
                    </p>


                    <h2>4. El Colapso: La Crisis de 2008</h2>

                    <p>
                    El esquema Ponzi solo muere cuando el flujo de salida de dinero supera al de entrada.
                    </p>

                    <p>
                    <strong>La Tormenta Perfecta:</strong> Con la crisis financiera de 2008, los inversores de Madoff, asustados, <br>intentaron retirar 7.000 millones de dólares. Madoff solo tenía unos 300 millones en el banco.
                    </p>

                    <p>
                    <strong>La Confesión:</strong> El 10 de diciembre de 2008,
                    <br>confesó a sus hijos que todo el negocio era “una gran mentira”.
                    </p>


                    <h2>5. El Veredicto y el Trágico Final</h2>

                    <p>
                    <strong>Sentencia:</strong> En 2009, Madoff se declaró culpable de 11 cargos federales y recibió la pena máxima de 150 años de prisión.
                    </p>

                    <p>
                    <strong>Tragedia Familiar:</strong> Su hijo mayor, Mark, se suicidó en el segundo aniversario del arresto de su <br>padre. Su otro hijo, Andrew, murió de cáncer años después, culpando al estrés del escándalo por su recaída. Su <br>esposa, Ruth, terminó viviendo en el anonimato, repudiada por gran parte de su círculo social.
                    </p>

                    <p>
                    <strong>Muerte:</strong> Bernie Madoff murió en prisión el 14 de abril de 2021, a los 82 años, por una enfermedad renal.
                    </p>

                    `;


                }else if(numero === "003"){

                    contenidoDinamico = `

                    <h1>El Desastre de Tenerife</h1>

                    <p>
                    El desastre de Tenerife, ocurrido el 27 de marzo de 1977, sigue siendo el accidente aéreo más mortífero de la <br>historia. Dos aviones Boeing 747, de las aerolíneas KLM y Pan Am, colisionaron en la pista del aeropuerto de <br>Los Rodeos, provocando la muerte de 583 personas. La tragedia fue el resultado de una fatídica combinación de <br>azar, clima extremo y errores de comunicación.
                    </p>

                    <p>
                        Detalles clave basados en las investigaciones oficiales de las autoridades españolas, holandesas y <br>estadounidenses:    
                    </p>

                    <h2>1. El Desvío Inesperado</h2>

                    <p>
                        Ninguno de los aviones debía estar en Tenerife. Una bomba colocada por un grupo terrorista en el aeropuerto de <br>Gran Canaria obligó a desviar el tráfico aéreo hacia el pequeño aeropuerto de Los Rodeos.
                    </p>

                    <p>
                        <strong>Saturación:</strong> El aeropuerto no estaba preparado para recibir tantos aviones de gran tamaño. La <br>plataforma principal se llenó, obligando a los aviones a utilizar la calle de rodaje como estacionamiento <br>y la pista principal para maniobrar.
                    </p>


                    <h2>Factores Críticos: Niebla y Radio</h2>

                    <p>
                        Las condiciones meteorológicas empeoraron drásticamente en minutos, reduciendo la visibilidad a apenas unos metros.    
                    </p>

                    <p>
                        <strong>Interferencias:</strong> Una comunicación crucial por radio fue bloqueada por una "interferencia" (un <br>pitido agudo). Cuando el controlador y Pan Am intentaron advertir que el avión seguía en pista, sus <br>mensajes se solaparon, y el capitán de KLM solo escuchó un silencio que interpretó como vía libre.
                    </p>

                    <p>
                        <strong>Barrera del idioma:</strong>  El uso de terminología no estándar, como "We are at take-off", generó <br>confusión entre si el avión estaba listo para despegar o iniciando la carrera.
                    </p>


                    <h2>3. El Impacto en la Pista</h2>

                    <p>
                        El capitán de KLM, Jacob Veldhuyzen van Zanten, inició el despegue sin una autorización clara de la torre. Al <br>mismo tiempo, el avión de Pan Am intentaba salir de la pista por la tercera intersección.
                    </p>

                    <p>
                        <strong>La colisión:</strong> Al ver las luces del Pan Am entre la niebla, KLM intentó elevarse <br>prematuramente, rozando la pista con la cola. Aunque logró despegar brevemente, los motores impactaron <br>contra la parte superior del Pan Am, arrancando el techo y provocando una explosión masiva debido a que el <br>KLM acababa de repostar combustible.
                    </p>


                    <h2>4. Testimonios y Supervivencia</h2>

                    <p>
                        Los 248 ocupantes del KLM fallecieron instantáneamente. En el avión de Pan Am, 61 personas lograron escapar de las llamas.
                    </p>

                    <p>
                        <strong>Pánico en la cabina:</strong> Supervivientes del Pan Am relataron cómo el techo desapareció de <br>repente. El copiloto de Pan Am, Robert Bragg, recordó ver al KLM surgir de la niebla y pensar: "¡Por Dios, <br>viene hacia nosotros!".    
                    </p>

                    <p>
                        <strong>El rescate ciego:</strong> Debido a la densa niebla, los controladores de la torre inicialmente no <br>sabían que había habido un choque; solo veían fuego pero no podían identificar qué aviones estaban involucrados.    
                    </p>


                    <h2>5. El Legado en la Aviación</h2>

                    <p>
                        La investigación oficial concluyó que el error principal fue del capitán de KLM al despegar sin autorización, <br>pero subrayó que el sistema de seguridad falló en múltiples niveles.    
                    </p>

                    <p>
                        <strong>CRM (Crew Resource Management):</strong> Tras este accidente, la industria cambió radicalmente. Se <br>eliminó la jerarquía absoluta del capitán, fomentando que los copilotos cuestionen las decisiones erróneas.
