<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Archive</title>
    <link rel="stylesheet" href="14.css">
    <link rel="icon" type="image/png" href="logo/Metal.png">
</head>
<body>
    <header>
         <nav id="navbar">
            <h1>Cat Archive</h1>
            <button id="lightdark"><p id="icono">◑</p></button>       
        </nav>
    </header>

    <main>
        <section>
            <div id="cat-wrapper">
                <div id="cat-loading">
                    <img id="catImage" src="" alt="Loading cat...">
                </div>
                <div id="likes-panel">
                    <div class="counter-box">
                        <p> Me gusta</p>
                        <span id="contadorgustar">0</span>
                    </div>
                    <div class="counter-box">
                        <p> No me gusta</p>
                        <span id="contadornogustar">0</span>
                    </div>
                </div>
            </div>
            <br>
            <section id="buttons-section">
                <button id="catbutton">cat</button>
                <button id="catbuttonGustar">me gusta</button>
                <button id="catbuttonNoGustar">no me gusta</button>
            </section>
        </section>
    </main>
    
    <footer>
            <p id="copyright">Copyright &copy; 2026 Cat Archive. All rights reserved.</p>
    </footer>

    <script src="14.js"></script>
</body>
</html>
