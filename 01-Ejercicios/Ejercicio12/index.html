
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="12.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <header>
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-icon">◈</span>
                <h1>Mi Colección</h1>
            </div>
            <div class="header-meta">
                <span class="counter-pill"><span id="counter">0</span> elementos</span>
                <button id="theme-btn" title="Cambiar tema">◑</button>
            </div>
        </div>
    </header>

    <section class="hero">
        <p class="hero-sub">Videojuegos · Películas · Series</p>
        <h2 class="hero-title">Tu archivo personal.</h2>
    </section>

    <div class="layout">

        <aside>
            <div class="aside-header">
                <span class="aside-icon">＋</span>
                <h2>Agregar</h2>
            </div>

            <div id="error-msg"></div>

            <div class="field-group">
                <label for="f-name">Nombre</label>
                <input type="text" id="f-name" placeholder="Ej: The Last of Us">
            </div>

            <div class="field-group">
                <label for="f-desc">Descripción</label>
                <input type="text" id="f-desc" placeholder="Una breve descripción...">
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label for="f-type">Tipo</label>
                    <select id="f-type">
                        <option value="">— Elegir —</option>
                        <option value="Videojuego">Videojuego</option>
                        <option value="Película">Película</option>
                        <option value="Serie">Serie</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="f-status">Estado</label>
                    <select id="f-status">
                        <option value="">— Elegir —</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En progreso">En progreso</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label>Calificación</label>
                <div id="star-group">
                    <span class="star" data-val="1">★</span>
                    <span class="star" data-val="2">★</span>
                    <span class="star" data-val="3">★</span>
                    <span class="star" data-val="4">★</span>
                    <span class="star" data-val="5">★</span>
                </div>
                <input type="hidden" id="f-rating" value="0">
            </div>

            <div class="field-group">
                <label for="f-img">URL de imagen <span class="optional">(opcional)</span></label>
                <input type="url" id="f-img" placeholder="https://...">
            </div>

            <button id="add-btn">
                <span>Agregar elemento</span>
                <span class="btn-arrow">→</span>
            </button>

        </aside>

        <main>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter-type="all">Todos</button>
                <button class="filter-btn" data-filter-type="Videojuego">🎮 Juegos</button>
                <button class="filter-btn" data-filter-type="Película">🎬 Películas</button>
                <button class="filter-btn" data-filter-type="Serie">📺 Series</button>
                <button class="filter-btn" data-filter-type="Otro">✦ Otros</button>
            </div>

            <div id="collection-grid">

                <div id="empty-state">
                    <div class="empty-icon">◈</div>
                    <h3>Colección vacía</h3>
                    <p>Agrega tu primer elemento desde el panel izquierdo.</p>
                </div>

                <div id="no-results" style="display:none;">
                    <div class="empty-icon">⊘</div>
                    <p>Sin resultados para este filtro.</p>
                </div>

            </div>

        </main>

    </div>

    <script src="12.JS"></script>
</body> 
</html>
