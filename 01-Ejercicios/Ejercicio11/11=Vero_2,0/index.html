<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería de Imágenes</title>

  <!-- CSS -->
  <link rel="stylesheet" href="vero.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    
    <div class="logo">
      <img src="Metal.png" alt="Icono de galería" width="55" class="logo img">
      Archive Gallery
    </div>

    <div>
        <button class="btn" id="btnSoloFav">
          ★ Favoritas
        </button>

        <button class="btn" id="btnBorrarTodas">
          X Borrar
        </button>
    </div>

  </header>

  <!-- MAIN -->
  <main>

    <h1 class="page-title">
      The Archive Gallery
    </h1>

    <p class="page-subtitle">
      Agregá imágenes, <br> marcá favoritas y organizá tu colección visual.
    </p>

    <!-- FORMULARIO -->
    <section class="form-panel">

      <h2>Agregar nueva imagen</h2>

      <div class="form-grid">

        <!-- TITULO -->
        <div class="form-group">
          <label for="Titulo">
            Título
          </label>

          <input 
            type="text" 
            id="Titulo" 
            placeholder="Ej: Paisaje nocturno"
          >
        </div>

        <!-- URL -->
        <div class="form-group">
          <label for="URL">
            URL de la imagen
          </label>

          <input 
            type="text" 
            id="URL" 
            placeholder="https://..."
          >
        </div>

        <!-- DESCRIPCIÓN -->
        <div class="form-group full">
          <label for="Descripcion">
            Descripción
          </label>

          <textarea 
            id="Descripcion"
            placeholder="Descripción opcional..."
          ></textarea>
        </div>

      </div>

      <!-- FOOTER DEL FORM -->
      <div class="form-footer">

        <button class="btn btn-primary" id="btnAgregar">
          ✦ Agregar imagen
        </button>

        <span class="error-msg" id="errorMsg">
          ⚠️ Completá el título y la URL.
        </span>

      </div>

    </section>

    <!-- TOOLBAR -->
    <section class="toolbar">

      <div class="counter" id="counter">
        0 imágenes · 0 favoritas
      </div>

    </section>

    <!-- GALERÍA -->
    <section class="gallery" id="galeria">

      <!-- Las tarjetas se generan con JavaScript -->

    </section>

  </main>

  <!-- FOOTER -->
  <footer>

    <p>
      ✦ Galería creada con HTML, CSS y JavaScript
    </p>

  </footer>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- JS -->
  <script src="vero.js"></script>

</body>
</html>
